<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GPA Calculator</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="style.css">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="script.js"></script>
</head>

<body>

<div class="container mt-4">

<h2 class="text-center">GPA Calculator</h2>

<form id="gpaForm">

<table class="table table-bordered">
<thead class="table-dark">
<tr>
<th>Course</th>
<th>Credits</th>
<th>Grade</th>
<th>Action</th>
</tr>
</thead>

<tbody id="courses">

<tr class="course-row">
<td><input type="text" name="course[]" class="form-control"></td>
<td><input type="number" name="credits[]" class="form-control"></td>
<td><input type="number" name="grade[]" step="0.1" class="form-control"></td>
<td>
<button type="button" class="btn btn-danger remove-row">Remove</button>
</td>
</tr>

</tbody>
</table>

<button type="button" id="addRow" class="btn btn-primary">
Add Course
</button>

<button type="submit" class="btn btn-success">
Calculate GPA
</button>

</form>

<div id="result" class="mt-4"></div>

</div>

</body>
</html>
